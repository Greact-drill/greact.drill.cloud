services:
  cloud:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - CURRENT_API_BASE_URL
        - KEYCLOAK_ISSUER_URL
        - KEYCLOAK_AUDIENCE
        - KEYCLOAK_JWKS_URL
        - CORS_ALLOWED_ORIGINS
    restart: always
    expose:
      - '3000'
    depends_on:
      cloud-db:
        condition: service_healthy
    container_name: greact-drill-cloud-${BRANCH}
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - CURRENT_API_BASE_URL=${CURRENT_API_BASE_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE}
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL}
    networks:
      proxy:
        aliases:
          - greact-drill-cloud-${BRANCH}
      internal:
        aliases:
          - greact-drill-cloud-${BRANCH}-internal

  cloud-db:
    image: postgres:17
    container_name: cloud-database-container-${BRANCH}
    restart: always
    expose:
      - '5432'
    volumes:
      - cloud-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - proxy
      - internal:
          aliases:
            - cloud-db-${BRANCH}
            - cloud-database-container-${BRANCH}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  cloud-db:
    name: ${CLOUD_DB_VOLUME_NAME}

networks:
  proxy:
    external: true
  internal:
    name: greact-drill-cloud-${BRANCH}-internal
